<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Shadow -->
  <rect x="12" y="12" width="176" height="176" rx="8" fill="#1E1E2F"/>
  <!-- Main box -->
  <rect x="4" y="4" width="176" height="176" rx="8" fill="#FF6B35"/>
  <!-- Dashed inner border -->
  <rect x="16" y="16" width="152" height="152" rx="4" fill="none" stroke="#1E1E2F" stroke-width="2" stroke-dasharray="8 4" opacity="0.3"/>
  <!-- Letter A -->
  <text x="68" y="132" font-family="'Courier New', monospace" font-size="100" font-weight="900" fill="#1E1E2F" text-anchor="middle">A</text>
  <!-- Letter C overlap -->
  <text x="128" y="132" font-family="'Courier New', monospace" font-size="100" font-weight="900" fill="#D4F0FF" text-anchor="middle">C</text>
  <!-- Accent dot -->
  <circle cx="160" cy="40" r="8" fill="#00D68F"/>
</svg>