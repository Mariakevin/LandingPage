<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Page Not Found | Arun Kumar</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <meta name="theme-color" content="#FFFFFF">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ═══════════════════════════════════════
       404 GAME PAGE — NEOSTACK BRICK BREAKER
       ═══════════════════════════════════════ */
    .game-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--surface-primary);
      color: var(--text-primary);
      position: relative;
      overflow: hidden;
    }

    /* ─── Background "404" watermark ─── */
    .game-page::before {
      content: '404';
      position: absolute;
      font-size: 30vw;
      font-weight: 700;
      opacity: 0.03;
      color: var(--text-primary);
      pointer-events: none;
      z-index: 0;
      font-family: var(--font-primary);
    }

    /* ─── Theme toggle (matches current pattern) ─── */
    .error-theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--surface-dark);
      color: var(--text-inverse);
      border: var(--border-default);
      padding: var(--space-2);
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform var(--duration-fast) var(--ease-smooth);
      z-index: 100;
    }
    .error-theme-toggle:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }
    .error-theme-toggle:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    .error-theme-toggle .icon-sun,
    .error-theme-toggle .icon-moon {
      width: 20px;
      height: 20px;
    }
    .error-theme-toggle .icon-sun { display: none; }
    .error-theme-toggle .icon-moon { display: block; }
    [data-theme="dark"] .error-theme-toggle .icon-sun { display: block; }
    [data-theme="dark"] .error-theme-toggle .icon-moon { display: none; }

    /* ─── Game header ─── */
    .game-header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .error-code {
      font-family: var(--font-primary);
      font-size: clamp(4rem, 12vw, 7rem);
      font-weight: 700;
      line-height: 1;
      color: var(--accent-primary);
      margin-bottom: 0.5rem;
      text-shadow:
        3px 3px 0 var(--text-primary),
        -3px -3px 0 var(--accent-secondary);
      animation: glitch-404 3s infinite;
    }

    @keyframes glitch-404 {
      0%, 100% { text-shadow: 3px 3px 0 var(--text-primary), -3px -3px 0 var(--accent-secondary); }
      10% { text-shadow: -3px -3px 0 var(--text-primary), 3px 3px 0 var(--accent-secondary); }
      20% { text-shadow: 3px 3px 0 var(--text-primary), -3px -3px 0 var(--accent-secondary); }
      30% { text-shadow: -3px -3px 0 var(--text-primary), 3px 3px 0 var(--accent-secondary); }
      40% { text-shadow: 3px 3px 0 var(--text-primary), -3px -3px 0 var(--accent-secondary); }
      50% { text-shadow: -3px -3px 0 var(--text-primary), 3px 3px 0 var(--accent-secondary); }
      60% { text-shadow: 3px 3px 0 var(--text-primary), -3px -3px 0 var(--accent-secondary); }
      70% { text-shadow: -3px -3px 0 var(--text-primary), 3px 3px 0 var(--accent-secondary); }
      80% { text-shadow: 3px 3px 0 var(--text-primary), -3px -3px 0 var(--accent-secondary); }
      90% { text-shadow: -3px -3px 0 var(--text-primary), 3px 3px 0 var(--accent-secondary); }
    }

    .game-subtitle {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    /* ─── Score display ─── */
    .game-score {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      position: relative;
      z-index: 1;
    }
    .game-score .count {
      color: var(--accent-primary);
      font-size: 1rem;
    }

    /* ─── Canvas wrapper ─── */
    .canvas-wrapper {
      position: relative;
      z-index: 1;
      border: 3px solid var(--text-primary);
      box-shadow: var(--shadow-lg);
      background: var(--surface-primary);
      line-height: 0;
      max-width: 100%;
    }

    .canvas-wrapper canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* ─── Game status (win / lose / prompt) ─── */
    .game-status {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    .game-status.active {
      pointer-events: auto;
    }

    .game-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      transition: opacity 0.3s var(--ease-smooth);
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
    }

    .game-overlay.visible {
      opacity: 1;
    }

    .game-overlay-text {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-inverse);
      text-align: center;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    }

    .game-overlay-sub {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-inverse);
      opacity: 0.85;
    }

    .game-overlay .btn-game {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      background: var(--surface-dark);
      color: var(--text-inverse);
      border: 3px solid var(--text-inverse);
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
      transition: transform 0.2s var(--ease-smooth), box-shadow 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .game-overlay .btn-game:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
    }

    .game-overlay .btn-game:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ─── Lives display ─── */
    .game-lives {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 0.75rem;
      color: var(--text-primary);
      position: relative;
      z-index: 1;
    }
    .game-lives .life-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: var(--accent-primary);
      border: 2px solid var(--text-primary);
      margin: 0 2px;
      vertical-align: middle;
    }
    .game-lives .life-dot.lost {
      opacity: 0.2;
    }

    /* ─── Canvas fallback ─── */
    .no-canvas-fallback {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 500px;
      position: relative;
      z-index: 1;
    }

    .no-canvas-fallback h2 {
      font-family: var(--font-primary);
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .no-canvas-fallback p {
      font-size: 0.9rem;
      line-height: 1.6;
      opacity: 0.7;
      margin-bottom: 2rem;
    }

    .no-canvas-fallback .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .no-canvas-fallback .error-home-btn,
    .no-canvas-fallback .error-back-btn {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.75rem 1.5rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: var(--border-default);
      cursor: pointer;
      transition: transform 0.2s var(--ease-smooth), box-shadow 0.2s;
    }

    .no-canvas-fallback .error-home-btn {
      background: var(--surface-dark);
      color: var(--text-inverse);
      box-shadow: var(--shadow-sm);
    }

    .no-canvas-fallback .error-home-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }

    .no-canvas-fallback .error-back-btn {
      background: var(--surface-secondary);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    .no-canvas-fallback .error-back-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }

    /* ─── Decorative shapes ─── */
    .game-decor {
      position: absolute;
      border: 3px solid var(--text-primary);
      opacity: 0.06;
      pointer-events: none;
    }
    .game-decor:nth-child(1) {
      width: 180px; height: 180px;
      top: 8%; left: 8%;
      animation: float-decor 6s ease-in-out infinite;
    }
    .game-decor:nth-child(2) {
      width: 100px; height: 100px;
      bottom: 12%; right: 12%;
      animation: float-decor 4s ease-in-out infinite reverse;
      border-radius: 50%;
    }
    .game-decor:nth-child(3) {
      width: 60px; height: 60px;
      top: 18%; right: 18%;
      animation: spin-decor 20s linear infinite;
      border-style: dashed;
    }

    @keyframes float-decor {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(3deg); }
    }
    @keyframes spin-decor {
      to { transform: rotate(360deg); }
    }

    /* ─── Responsive ─── */
    @media (max-width: 640px) {
      .game-page { padding: 1rem; }
      .error-code { font-size: clamp(3rem, 14vw, 5rem); }
      .game-overlay-text { font-size: 1.1rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .error-code { animation: none; }
      .game-decor { animation: none; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#game">Skip to game</a>

  <!-- Decorative shapes -->
  <div class="game-decor" aria-hidden="true"></div>
  <div class="game-decor" aria-hidden="true"></div>
  <div class="game-decor" aria-hidden="true"></div>

  <!-- Theme Toggle -->
  <button class="error-theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <main class="game-page" id="game">
    <div class="game-header">
      <div class="error-code" aria-hidden="true">404</div>
      <p class="game-subtitle">Clear the bricks to find your way home</p>
    </div>

    <div class="game-score" id="game-score">Bricks: <span class="count" id="brick-count">15</span> remaining</div>

    <div class="canvas-wrapper" id="canvas-wrapper">
      <canvas
        id="game-canvas"
        width="600"
        height="400"
        role="img"
        aria-label="404 Breakout game — use arrow keys or touch to move paddle"
      ></canvas>
      <div class="game-status" id="game-status">
        <div class="game-overlay" id="overlay-prompt">
          <div class="game-overlay-text">Click to play</div>
          <div class="game-overlay-sub">or tap on mobile</div>
        </div>
        <div class="game-overlay" id="overlay-win">
          <div class="game-overlay-text">You found it!</div>
          <div class="btn-row">
            <a href="index.html" class="btn-game">Go home →</a>
          </div>
        </div>
        <div class="game-overlay" id="overlay-lose">
          <div class="game-overlay-text">Game over</div>
          <div class="btn-row">
            <button class="btn-game" id="btn-retry">Try again</button>
            <a href="index.html" class="btn-game">Go home →</a>
          </div>
        </div>
      </div>
    </div>

    <div class="game-lives" id="game-lives">
      Lives:
      <span class="life-dot" id="life-1"></span>
      <span class="life-dot" id="life-2"></span>
      <span class="life-dot" id="life-3"></span>
    </div>
  </main>

  <script>
  (function () {
    'use strict';

    /* ═══════════════════════════════════════════════
       CONSTANTS
       ═══════════════════════════════════════════════ */
    const CANVAS_W = 600;
    const CANVAS_H = 400;
    const BRICK_ROWS = 3;
    const BRICK_COLS = 5;
    const BRICK_PAD = 4;
    const BRICK_TOP_OFFSET = 10;
    const BRICK_H = 26;
    const BALL_R = 4;
    const BALL_BASE_SPEED = 3.5;
    const BALL_MAX_SPEED = 7;
    const SPEED_INCREMENT = 0.12;
    const PADDLE_H = 12;
    const PADDLE_W = 90;
    const PADDLE_BOTTOM = 20;
    const INITIAL_LIVES = 3;
    const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const BRICK_COLORS = [
      { bg: '#E53935', labels: ['Skills', 'About', 'Experience', 'Projects', 'Blog'] },
      { bg: '#2979FF', labels: ['React', 'Node.js', 'TypeScript', 'Python', 'Go'] },
      { bg: '#FF4081', labels: ['CSS', 'Docker', 'AWS', 'Figma', 'Git'] },
    ];

    /* ═══════════════════════════════════════════════
       DOM REFS
       ═══════════════════════════════════════════════ */
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvas-wrapper');
    const scoreEl = document.getElementById('brick-count');
    const livesEl = document.getElementById('game-lives');
    const overlayPrompt = document.getElementById('overlay-prompt');
    const overlayWin = document.getElementById('overlay-win');
    const overlayLose = document.getElementById('overlay-lose');
    const btnRetry = document.getElementById('btn-retry');
    const statusContainer = document.getElementById('game-status');

    /* ═══════════════════════════════════════════════
       CANVAS FALLBACK
       ═══════════════════════════════════════════════ */
    if (!ctx) {
      canvas.style.display = 'none';
      document.getElementById('game-score').style.display = 'none';
      document.getElementById('game-lives').style.display = 'none';
      statusContainer.style.display = 'none';

      const fallback = document.createElement('div');
      fallback.className = 'no-canvas-fallback';
      fallback.innerHTML =
        '<h2>Browser not supported</h2>' +
        '<p>Your browser doesn\'t support Canvas, which is needed for this game.</p>' +
        '<div class="error-actions">' +
        '<a href="index.html" class="error-home-btn">Go home →</a>' +
        '<button onclick="history.back()" class="error-back-btn">← Go back</button>' +
        '</div>';
      wrapper.parentNode.insertBefore(fallback, wrapper.nextSibling);
      return;
    }

    /* ═══════════════════════════════════════════════
       THEME TOGGLE
       ═══════════════════════════════════════════════ */
    const themeToggle = document.getElementById('theme-toggle');
    const htmlEl = document.documentElement;

    function getPreferredTheme() {
      var stored = localStorage.getItem('theme');
      if (stored) return stored;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function setTheme(theme) {
      htmlEl.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      updateThemeColor(theme);
    }

    function updateThemeColor(theme) {
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', theme === 'dark' ? '#1A1A1A' : '#FFFFFF');
    }

    setTheme(getPreferredTheme());

    themeToggle.addEventListener('click', function () {
      var current = htmlEl.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
      if (!localStorage.getItem('theme')) {
        setTheme(e.matches ? 'dark' : 'light');
      }
    });

    /* ═══════════════════════════════════════════════
       READ CSS CUSTOM PROPERTIES FOR THEMING
       ═══════════════════════════════════════════════ */
    function getCSSVar(name) {
      return getComputedStyle(htmlEl).getPropertyValue(name).trim();
    }

    function getThemeColors() {
      return {
        bg: getCSSVar('--surface-primary'),
        text: getCSSVar('--text-primary'),
        textSecondary: getCSSVar('--text-secondary'),
        accent: getCSSVar('--accent-primary'),
        shadow: getCSSVar('--shadow-color'),
        border: getCSSVar('--text-primary'),
      };
    }

    /* ═══════════════════════════════════════════════
       GAME STATE
       ═══════════════════════════════════════════════ */
    var state = {};

    function resetGame() {
      var brickAreaW = CANVAS_W - 20;
      var brickW = (brickAreaW - (BRICK_COLS - 1) * BRICK_PAD) / BRICK_COLS;

      state = {
        bricks: [],
        brickW: brickW,
        brickAreaX: 10,
        paddle: {
          x: CANVAS_W / 2 - PADDLE_W / 2,
          y: CANVAS_H - PADDLE_BOTTOM - PADDLE_H,
          w: PADDLE_W,
          h: PADDLE_H,
          targetX: CANVAS_W / 2 - PADDLE_W / 2,
        },
        ball: {
          x: CANVAS_W / 2,
          y: CANVAS_H - PADDLE_BOTTOM - PADDLE_H - BALL_R - 2,
          vx: 0,
          vy: 0,
          speed: BALL_BASE_SPEED,
          launched: false,
        },
        lives: INITIAL_LIVES,
        bricksRemaining: BRICK_ROWS * BRICK_COLS,
        phase: 'prompt', // 'prompt' | 'playing' | 'won' | 'lost'
        mouseX: CANVAS_W / 2,
        keysDown: {},
      };

      // Build bricks
      for (var r = 0; r < BRICK_ROWS; r++) {
        for (var c = 0; c < BRICK_COLS; c++) {
          var bx = state.brickAreaX + c * (brickW + BRICK_PAD);
          var by = BRICK_TOP_OFFSET + r * (BRICK_H + BRICK_PAD);
          state.bricks.push({
            x: bx,
            y: by,
            w: brickW,
            h: BRICK_H,
            alive: true,
            color: BRICK_COLORS[r].bg,
            label: BRICK_COLORS[r].labels[c],
          });
        }
      }

      updateScoreUI();
      updateLivesUI();
      showOverlay('prompt');
    }

    /* ═══════════════════════════════════════════════
       UI HELPERS
       ═══════════════════════════════════════════════ */
    function updateScoreUI() {
      scoreEl.textContent = state.bricksRemaining;
    }

    function updateLivesUI() {
      for (var i = 1; i <= INITIAL_LIVES; i++) {
        var dot = document.getElementById('life-' + i);
        if (dot) dot.classList.toggle('lost', i > state.lives);
      }
    }

    function showOverlay(type) {
      overlayPrompt.classList.toggle('visible', type === 'prompt');
      overlayWin.classList.toggle('visible', type === 'won');
      overlayLose.classList.toggle('visible', type === 'lost');
      statusContainer.classList.toggle('active', type !== 'playing');
    }

    /* ═══════════════════════════════════════════════
       INPUT HANDLING
       ═══════════════════════════════════════════════ */
    // Keyboard
    document.addEventListener('keydown', function (e) {
      state.keysDown[e.key] = true;

      if (e.key === 'Escape' || e.key === 'h') {
        if (!e.ctrlKey && !e.metaKey && !e.altKey) {
          window.location.href = 'index.html';
        }
      }
    });

    document.addEventListener('keyup', function (e) {
      state.keysDown[e.key] = false;
    });

    // Mouse
    canvas.addEventListener('mousemove', function (e) {
      var rect = canvas.getBoundingClientRect();
      var scaleX = CANVAS_W / rect.width;
      state.mouseX = (e.clientX - rect.left) * scaleX;
    });

    // Touch
    canvas.addEventListener('touchmove', function (e) {
      e.preventDefault();
      var rect = canvas.getBoundingClientRect();
      var scaleX = CANVAS_W / rect.width;
      state.mouseX = (e.touches[0].clientX - rect.left) * scaleX;
    }, { passive: false });

    // Click / tap to start
    function handleInteraction() {
      if (state.phase === 'prompt') {
        launchBall();
      }
    }

    canvas.addEventListener('click', handleInteraction);
    canvas.addEventListener('touchstart', function (e) {
      e.preventDefault();
      handleInteraction();
    }, { passive: false });

    btnRetry.addEventListener('click', function () {
      resetGame();
    });

    /* ═══════════════════════════════════════════════
       GAME LOGIC
       ═══════════════════════════════════════════════ */
    function launchBall() {
      state.phase = 'playing';
      state.ball.launched = true;
      var angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
      state.ball.vx = Math.cos(angle) * state.ball.speed;
      state.ball.vy = Math.sin(angle) * state.ball.speed;
      showOverlay('playing');
    }

    function movePaddle() {
      var paddle = state.paddle;

      // Arrow keys
      var keySpeed = 7;
      if (state.keysDown['ArrowLeft'] || state.keysDown['Left']) {
        paddle.targetX = paddle.x - keySpeed;
      }
      if (state.keysDown['ArrowRight'] || state.keysDown['Right']) {
        paddle.targetX = paddle.x + keySpeed;
      }

      // Mouse / touch tracking
      if (!state.keysDown['ArrowLeft'] && !state.keysDown['ArrowRight'] &&
          !state.keysDown['Left'] && !state.keysDown['Right']) {
        paddle.targetX = state.mouseX - paddle.w / 2;
      }

      // Clamp
      paddle.targetX = Math.max(0, Math.min(CANVAS_W - paddle.w, paddle.targetX));

      // Smooth follow
      paddle.x += (paddle.targetX - paddle.x) * 0.35;
    }

    function moveBall() {
      var ball = state.ball;

      if (!ball.launched) {
        ball.x = state.paddle.x + state.paddle.w / 2;
        ball.y = state.paddle.y - BALL_R - 2;
        return;
      }

      ball.x += ball.vx;
      ball.y += ball.vy;

      // Wall collisions
      if (ball.x - BALL_R <= 0) {
        ball.x = BALL_R;
        ball.vx = Math.abs(ball.vx);
      }
      if (ball.x + BALL_R >= CANVAS_W) {
        ball.x = CANVAS_W - BALL_R;
        ball.vx = -Math.abs(ball.vx);
      }
      if (ball.y - BALL_R <= 0) {
        ball.y = BALL_R;
        ball.vy = Math.abs(ball.vy);
      }

      // Bottom = lose life
      if (ball.y + BALL_R > CANVAS_H) {
        state.lives--;
        updateLivesUI();
        if (state.lives <= 0) {
          state.phase = 'lost';
          showOverlay('lost');
          return;
        }
        // Reset ball
        ball.launched = false;
        ball.x = state.paddle.x + state.paddle.w / 2;
        ball.y = state.paddle.y - BALL_R - 2;
        ball.vx = 0;
        ball.vy = 0;
        ball.speed = BALL_BASE_SPEED;
        showOverlay('prompt');
        return;
      }

      // Paddle collision
      var p = state.paddle;
      if (ball.vy > 0 &&
          ball.y + BALL_R >= p.y &&
          ball.y + BALL_R <= p.y + p.h + 4 &&
          ball.x >= p.x - 2 &&
          ball.x <= p.x + p.w + 2) {
        // Angle based on hit position
        var hitPos = (ball.x - p.x) / p.w; // 0..1
        var angle = -Math.PI * (0.15 + hitPos * 0.7); // between -0.15π and -0.85π
        ball.vx = Math.cos(angle) * ball.speed;
        ball.vy = Math.sin(angle) * ball.speed;
        ball.y = p.y - BALL_R - 1;
      }

      // Brick collisions
      for (var i = 0; i < state.bricks.length; i++) {
        var brick = state.bricks[i];
        if (!brick.alive) continue;

        if (ball.x + BALL_R > brick.x &&
            ball.x - BALL_R < brick.x + brick.w &&
            ball.y + BALL_R > brick.y &&
            ball.y - BALL_R < brick.y + brick.h) {

          brick.alive = false;
          state.bricksRemaining--;
          updateScoreUI();

          // Determine bounce direction
          var overlapLeft = (ball.x + BALL_R) - brick.x;
          var overlapRight = (brick.x + brick.w) - (ball.x - BALL_R);
          var overlapTop = (ball.y + BALL_R) - brick.y;
          var overlapBottom = (brick.y + brick.h) - (ball.y - BALL_R);

          var minOverlapX = Math.min(overlapLeft, overlapRight);
          var minOverlapY = Math.min(overlapTop, overlapBottom);

          if (minOverlapX < minOverlapY) {
            ball.vx = -ball.vx;
          } else {
            ball.vy = -ball.vy;
          }

          // Speed up
          if (!REDUCED_MOTION) {
            ball.speed = Math.min(ball.speed + SPEED_INCREMENT, BALL_MAX_SPEED);
            var currentSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            var factor = ball.speed / currentSpeed;
            ball.vx *= factor;
            ball.vy *= factor;
          }

          // Win check
          if (state.bricksRemaining <= 0) {
            state.phase = 'won';
            showOverlay('won');
          }

          break; // one brick per frame
        }
      }
    }

    /* ═══════════════════════════════════════════════
       RENDERING
       ═══════════════════════════════════════════════ */
    function draw() {
      var colors = getThemeColors();

      // Clear
      ctx.fillStyle = colors.bg;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Draw bricks
      for (var i = 0; i < state.bricks.length; i++) {
        var brick = state.bricks[i];
        if (!brick.alive) continue;

        // Shadow offset (neobrutalist)
        ctx.fillStyle = colors.shadow;
        ctx.fillRect(brick.x + 3, brick.y + 3, brick.w, brick.h);

        // Brick body
        ctx.fillStyle = brick.color;
        ctx.fillRect(brick.x, brick.y, brick.w, brick.h);

        // Border
        ctx.strokeStyle = colors.border;
        ctx.lineWidth = 3;
        ctx.strokeRect(brick.x, brick.y, brick.w, brick.h);

        // Label
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '700 10px "Space Mono", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(brick.label.toUpperCase(), brick.x + brick.w / 2, brick.y + brick.h / 2);
      }

      // Draw paddle
      var paddle = state.paddle;
      ctx.fillStyle = colors.shadow;
      ctx.fillRect(paddle.x + 3, paddle.y + 3, paddle.w, paddle.h);
      ctx.fillStyle = colors.text;
      ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
      ctx.strokeStyle = colors.border;
      ctx.lineWidth = 3;
      ctx.strokeRect(paddle.x, paddle.y, paddle.w, paddle.h);

      // Draw ball
      var ball = state.ball;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = colors.accent;
      ctx.fill();
      ctx.strokeStyle = colors.border;
      ctx.lineWidth = 3;
      ctx.stroke();

      // Ball shadow
      ctx.beginPath();
      ctx.arc(ball.x + 3, ball.y + 3, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fill();
    }

    /* ═══════════════════════════════════════════════
       GAME LOOP
       ═══════════════════════════════════════════════ */
    function gameLoop() {
      if (state.phase === 'playing' || state.phase === 'prompt') {
        movePaddle();
        moveBall();
        draw();
      }
      requestAnimationFrame(gameLoop);
    }

    /* ═══════════════════════════════════════════════
       INIT
       ═══════════════════════════════════════════════ */
    resetGame();
    draw();
    requestAnimationFrame(gameLoop);

  })();
  </script>
</body>
