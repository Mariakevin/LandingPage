<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ═══════════════════════════════════════════════════════
       404 GAME PAGE — Scoped overrides
       ═══════════════════════════════════════════════════════ */
    .game-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--surface-primary);
      color: var(--text-primary);
      padding: var(--space-4);
      position: relative;
      overflow: hidden;
    }

    /* Fix: Restore cursor on 404 page (styles.css hides it on fine pointers) */
    .game-page,
    .game-page * {
      cursor: default;
    }

    /* ─── HEADER ─── */
    .game-header {
      text-align: center;
      margin-bottom: var(--space-6);
      position: relative;
      z-index: 2;
    }
    .game-header h1 {
      font-family: var(--font-primary);
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
      position: relative;
    }
    .game-header h1 .accent {
      display: inline-block;
      background: var(--accent-primary);
      color: var(--text-inverse);
      padding: 0 0.5rem;
      transform: rotate(-2deg);
      position: relative;
    }
    .game-header h1 .accent::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 100%; height: 4px;
      background: var(--text-primary);
    }
    .game-header p {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    /* ─── GAME AREA ─── */
    .game-area {
      position: relative;
      width: 100%;
      max-width: 640px;
      border: var(--border-default);
      box-shadow: var(--shadow-lg);
      background: var(--surface-dark);
      overflow: hidden;
    }
    .game-area::before {
      content: '';
      position: absolute;
      top: 8px; left: 8px; right: -8px; bottom: -8px;
      background: var(--accent-primary);
      z-index: -1;
    }

    /* ─── STATUS BAR ─── */
    .game-status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-2) var(--space-3);
      background: var(--surface-secondary);
      border-bottom: var(--border-default);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .game-status-bar .lives {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }
    .game-status-bar .lives .heart {
      color: var(--accent-primary);
      font-size: 1rem;
    }
    .game-status-bar .score {
      color: var(--accent-secondary);
    }

    /* ─── CANVAS WRAPPER ─── */
    .canvas-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      cursor: crosshair;
    }
    .canvas-wrapper canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ─── OVERLAY (the critical bug fix) ─── */
    .game-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(26, 26, 26, 0.85);
      z-index: 10;
      transition: opacity 0.3s var(--ease-smooth);
      /* FIX: pointer-events auto so it receives clicks, and we listen on it */
      pointer-events: auto;
    }
    .game-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .game-overlay h2 {
      font-family: var(--font-primary);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-inverse);
      margin-bottom: var(--space-2);
    }
    .game-overlay p {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-primary);
      animation: pulse-text 2s ease-in-out infinite;
    }
    @keyframes pulse-text {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ─── GAME OVER / WIN SCREENS ─── */
    .game-overlay .result-icon {
      font-size: 3rem;
      margin-bottom: var(--space-3);
    }
    .game-overlay .result-score {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-inverse);
      margin-bottom: var(--space-4);
    }
    .game-overlay .btn-group {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      justify-content: center;
    }
    .game-btn {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: var(--space-2) var(--space-4);
      border: var(--border-default);
      cursor: pointer;
      transition: transform 0.2s var(--ease-smooth);
      box-shadow: var(--shadow-sm);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }
    .game-btn.primary {
      background: var(--accent-primary);
      color: var(--text-inverse);
    }
    .game-btn.secondary {
      background: var(--surface-secondary);
      color: var(--text-primary);
    }
    .game-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }
    .game-btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    .game-btn:focus-visible {
      outline: 3px solid var(--accent-secondary);
      outline-offset: 2px;
    }

    /* ─── THEME TOGGLE ─── */
    .theme-toggle-404 {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      z-index: 100;
      background: var(--surface-dark);
      color: var(--text-inverse);
      border: var(--border-default);
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform var(--duration-fast) var(--ease-smooth);
    }
    .theme-toggle-404:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }
    .theme-toggle-404:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    .theme-toggle-404:focus-visible {
      outline: 3px solid var(--accent-secondary);
      outline-offset: 2px;
    }
    .theme-toggle-404 .icon-sun,
    .theme-toggle-404 .icon-moon {
      width: 20px;
      height: 20px;
    }
    .theme-toggle-404 .icon-sun { display: none; }
    .theme-toggle-404 .icon-moon { display: block; }
    [data-theme="dark"] .theme-toggle-404 .icon-sun { display: block; }
    [data-theme="dark"] .theme-toggle-404 .icon-moon { display: none; }

    /* ─── GO HOME LINK ─── */
    .go-home {
      position: fixed;
      top: var(--space-4);
      left: var(--space-4);
      z-index: 100;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text-primary);
      background: var(--surface-secondary);
      padding: var(--space-2) var(--space-3);
      border: var(--border-default);
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s var(--ease-smooth);
    }
    .go-home:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }
    .go-home:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    .go-home:focus-visible {
      outline: 3px solid var(--accent-secondary);
      outline-offset: 2px;
    }

    /* ─── INSTRUCTIONS ─── */
    .game-instructions {
      margin-top: var(--space-4);
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      max-width: 640px;
    }
    .game-instructions kbd {
      display: inline-block;
      padding: 0.1em 0.4em;
      border: 2px solid var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      background: var(--surface-secondary);
    }

    /* ─── DECORATIVE SHAPES ─── */
    .game-decor {
      position: fixed;
      border: 3px solid var(--text-primary);
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }
    .game-decor-1 {
      width: 200px; height: 200px;
      top: -40px; right: 5%;
      animation: float-decor 8s ease-in-out infinite;
    }
    .game-decor-2 {
      width: 120px; height: 120px;
      bottom: 10%; left: 3%;
      border-radius: 50%;
      animation: float-decor 6s ease-in-out infinite reverse;
    }
    .game-decor-3 {
      width: 80px; height: 80px;
      top: 20%; left: 8%;
      animation: spin-decor 20s linear infinite;
      border-radius: 50%;
      border-style: dashed;
    }
    @keyframes float-decor {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(3deg); }
    }
    @keyframes spin-decor {
      to { transform: rotate(360deg); }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .game-area {
        max-width: 100%;
      }
      .game-header h1 {
        font-size: clamp(3rem, 15vw, 5rem);
      }
      .game-decor { display: none; }
      .go-home {
        top: auto;
        bottom: var(--space-4);
        left: var(--space-4);
      }
      .theme-toggle-404 {
        top: auto;
        bottom: var(--space-4);
        right: var(--space-4);
      }
    }
    @media (max-width: 480px) {
      .game-header h1 {
        font-size: clamp(2.5rem, 18vw, 4rem);
      }
      .game-header p {
        font-size: 0.7rem;
      }
      .game-status-bar {
        font-size: 0.65rem;
        padding: var(--space-1) var(--space-2);
      }
      .game-instructions {
        font-size: 0.6rem;
      }
    }

    /* ─── REDUCED MOTION ─── */
    @media (prefers-reduced-motion: reduce) {
      .game-overlay p { animation: none; }
      .game-decor { animation: none; }
      .game-header h1 .accent { transform: none; }
    }
  </style>
</head>
<body class="game-page">
  <!-- Decorative shapes -->
  <div class="game-decor game-decor-1" aria-hidden="true"></div>
  <div class="game-decor game-decor-2" aria-hidden="true"></div>
  <div class="game-decor game-decor-3" aria-hidden="true"></div>

  <!-- Theme toggle -->
  <button class="theme-toggle-404" id="theme-toggle-404" aria-label="Toggle theme" type="button">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <!-- Go home -->
  <a href="index.html" class="go-home" aria-label="Go home">&larr; Home</a>

  <!-- Header -->
  <header class="game-header">
    <h1><span class="accent">4</span>0<span class="accent">4</span></h1>
    <p>Clear the bricks to find your way home</p>
  </header>

  <!-- Game area -->
  <div class="game-area" id="game-area">
    <!-- Status bar -->
    <div class="game-status-bar">
      <div class="lives" id="lives-display">
        <span class="heart" aria-hidden="true">&#9829;</span>
        <span class="heart" aria-hidden="true">&#9829;</span>
        <span class="heart" aria-hidden="true">&#9829;</span>
      </div>
      <div class="score" id="score-display">Score: 0</div>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrapper" id="canvas-wrapper">
      <canvas id="game-canvas"></canvas>

      <!-- Overlay prompt — FIX: we listen for clicks ON this element -->
      <div class="game-overlay" id="game-overlay">
        <div class="result-icon" id="result-icon" style="display:none;"></div>
        <h2 id="overlay-title">404</h2>
        <p id="overlay-prompt">Click to play</p>
        <div class="result-score" id="result-score" style="display:none;"></div>
        <div class="btn-group" id="result-buttons" style="display:none;">
          <button class="game-btn primary" id="btn-retry" type="button">Try again</button>
          <a href="index.html" class="game-btn secondary">Go home</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Instructions -->
  <p class="game-instructions">
    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> or mouse to move &middot;
    <kbd>Space</kbd> to launch
  </p>

  <script>
    // ═══════════════════════════════════════════
    // 404 BREAKOUT GAME — Self-contained
    // ═══════════════════════════════════════════
    (function () {
      'use strict';

      // ─── DOM refs ───
      const canvas = document.getElementById('game-canvas');
      const ctx = canvas.getContext('2d');
      const wrapper = document.getElementById('canvas-wrapper');
      const overlay = document.getElementById('game-overlay');
      const overlayTitle = document.getElementById('overlay-title');
      const overlayPrompt = document.getElementById('overlay-prompt');
      const resultIcon = document.getElementById('result-icon');
      const resultScore = document.getElementById('result-score');
      const resultButtons = document.getElementById('result-buttons');
      const btnRetry = document.getElementById('btn-retry');
      const scoreDisplay = document.getElementById('score-display');
      const livesDisplay = document.getElementById('lives-display');
      const themeToggle = document.getElementById('theme-toggle-404');

      // ─── Read CSS tokens ───
      function getCSSVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      }

      // ─── Game state ───
      const DPR = window.devicePixelRatio || 1;
      let W, H;
      let gameRunning = false;
      let gamePaused = false;
      let score = 0;
      let lives = 3;
      let ballLaunched = false;
      let animFrame = null;

      // Ball
      let ballX, ballY, ballR, ballDX, ballDY;
      const BALL_SPEED = 4;

      // Paddle
      let paddleX, paddleW, paddleH, paddleY;
      const PADDLE_SPEED = 8;

      // Bricks
      const BRICK_ROWS = 5;
      const BRICK_COLS = 8;
      const BRICK_PAD = 4;
      let bricks = [];
      let brickW, brickH, brickOffsetTop, brickOffsetLeft;

      // Input
      let keys = {};
      let mouseX = null;
      let touchX = null;

      // ─── Colors (read from tokens) ───
      let colors = {};
      function loadColors() {
        colors = {
          bg: getCSSVar('--surface-dark') || '#1A1A1A',
          paddle: getCSSVar('--text-primary') || '#F2F2F2',
          ball: getCSSVar('--accent-primary') || '#E53935',
          brick0: getCSSVar('--accent-primary') || '#E53935',
          brick1: getCSSVar('--accent-secondary') || '#2979FF',
          brick2: getCSSVar('--accent-tertiary') || '#FF4081',
          brick3: getCSSVar('--brand-green') || '#00E676',
          brick4: getCSSVar('--brand-yellow') || '#FFEA00',
          text: getCSSVar('--text-inverse') || '#FFFFFF',
          border: getCSSVar('--text-primary') || '#1A1A1A',
        };
      }

      // ─── Resize ───
      function resize() {
        const rect = wrapper.getBoundingClientRect();
        W = Math.floor(rect.width);
        H = Math.floor(rect.height);
        canvas.width = W * DPR;
        canvas.height = H * DPR;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

        // Recalc paddle/brick sizes
        paddleW = Math.max(60, W * 0.15);
        paddleH = 12;
        paddleY = H - paddleH - 8;
        if (paddleX === undefined) paddleX = (W - paddleW) / 2;

        brickW = (W - BRICK_PAD * (BRICK_COLS + 1)) / BRICK_COLS;
        brickH = Math.max(16, H * 0.04);
        brickOffsetTop = 20;
        brickOffsetLeft = BRICK_PAD;

        ballR = Math.max(5, W * 0.012);
      }

      // ─── Init bricks ───
      function initBricks() {
        bricks = [];
        for (let r = 0; r < BRICK_ROWS; r++) {
          bricks[r] = [];
          for (let c = 0; c < BRICK_COLS; c++) {
            bricks[r][c] = { alive: true };
          }
        }
      }

      // ─── Init ball ───
      function initBall() {
        ballLaunched = false;
        ballX = paddleX + paddleW / 2;
        ballY = paddleY - ballR - 2;
        const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
        ballDX = BALL_SPEED * Math.cos(angle);
        ballDY = BALL_SPEED * Math.sin(angle);
        // Ensure ball goes up
        if (ballDY > 0) ballDY = -ballDY;
      }

      // ─── Full reset ───
      function resetGame() {
        score = 0;
        lives = 3;
        loadColors();
        resize();
        initBricks();
        paddleX = (W - paddleW) / 2;
        initBall();
        updateUI();
      }

      // ─── UI updates ───
      function updateUI() {
        scoreDisplay.textContent = 'Score: ' + score;
        let heartsHTML = '';
        for (let i = 0; i < 3; i++) {
          heartsHTML += '<span class="heart" aria-hidden="true" style="opacity:' + (i < lives ? 1 : 0.25) + '">&#9829;</span>';
        }
        livesDisplay.innerHTML = heartsHTML;
      }

      // ─── Overlay control ───
      function showOverlay(title, prompt, icon, scoreText, showBtns) {
        overlayTitle.textContent = title;
        overlayPrompt.textContent = prompt;
        overlayPrompt.style.display = prompt ? '' : 'none';
        resultIcon.textContent = icon || '';
        resultIcon.style.display = icon ? '' : 'none';
        resultScore.textContent = scoreText || '';
        resultScore.style.display = scoreText ? '' : 'none';
        resultButtons.style.display = showBtns ? '' : 'none';
        overlay.classList.remove('hidden');
      }

      function hideOverlay() {
        overlay.classList.add('hidden');
      }

      // ─── Game loop ───
      function update() {
        if (!gameRunning || gamePaused) return;

        // Paddle movement
        if (mouseX !== null) {
          paddleX = mouseX - paddleW / 2;
        } else if (touchX !== null) {
          paddleX = touchX - paddleW / 2;
        } else {
          if (keys['ArrowLeft'] || keys['a']) paddleX -= PADDLE_SPEED;
          if (keys['ArrowRight'] || keys['d']) paddleX += PADDLE_SPEED;
        }
        paddleX = Math.max(0, Math.min(W - paddleW, paddleX));

        // Ball follows paddle before launch
        if (!ballLaunched) {
          ballX = paddleX + paddleW / 2;
          ballY = paddleY - ballR - 2;
          return;
        }

        // Ball movement
        ballX += ballDX;
        ballY += ballDY;

        // Wall collisions
        if (ballX - ballR <= 0) { ballX = ballR; ballDX = Math.abs(ballDX); }
        if (ballX + ballR >= W) { ballX = W - ballR; ballDX = -Math.abs(ballDX); }
        if (ballY - ballR <= 0) { ballY = ballR; ballDY = Math.abs(ballDY); }

        // Bottom — lose life
        if (ballY + ballR >= H) {
          lives--;
          updateUI();
          if (lives <= 0) {
            gameOver();
            return;
          }
          initBall();
          return;
        }

        // Paddle collision
        if (
          ballDY > 0 &&
          ballY + ballR >= paddleY &&
          ballY + ballR <= paddleY + paddleH + 4 &&
          ballX >= paddleX - 2 &&
          ballX <= paddleX + paddleW + 2
        ) {
          const hitPos = (ballX - paddleX) / paddleW;
          const angle = -Math.PI / 2 + (hitPos - 0.5) * 1.2;
          ballDX = BALL_SPEED * Math.cos(angle);
          ballDY = BALL_SPEED * Math.sin(angle);
          if (ballDY > 0) ballDY = -ballDY;
          ballY = paddleY - ballR - 1;
        }

        // Brick collisions
        for (let r = 0; r < BRICK_ROWS; r++) {
          for (let c = 0; c < BRICK_COLS; c++) {
            const b = bricks[r][c];
            if (!b.alive) continue;
            const bx = brickOffsetLeft + c * (brickW + BRICK_PAD);
            const by = brickOffsetTop + r * (brickH + BRICK_PAD);
            if (
              ballX + ballR > bx &&
              ballX - ballR < bx + brickW &&
              ballY + ballR > by &&
              ballY - ballR < by + brickH
            ) {
              b.alive = false;
              score += (BRICK_ROWS - r) * 10;
              updateUI();

              // Determine bounce direction
              const overlapLeft = (ballX + ballR) - bx;
              const overlapRight = (bx + brickW) - (ballX - ballR);
              const overlapTop = (ballY + ballR) - by;
              const overlapBottom = (by + brickH) - (ballY - ballR);
              const minOverlapX = Math.min(overlapLeft, overlapRight);
              const minOverlapY = Math.min(overlapTop, overlapBottom);

              if (minOverlapX < minOverlapY) {
                ballDX = -ballDX;
              } else {
                ballDY = -ballDY;
              }

              // Check win
              if (bricks.every(row => row.every(brick => !brick.alive))) {
                gameWin();
                return;
              }
              // Only handle one brick collision per frame
              return;
            }
          }
        }
      }

      function draw() {
        loadColors();
        ctx.clearRect(0, 0, W, H);

        // Background
        ctx.fillStyle = colors.bg;
        ctx.fillRect(0, 0, W, H);

        // Bricks
        const brickColors = [colors.brick0, colors.brick1, colors.brick2, colors.brick3, colors.brick4];
        for (let r = 0; r < BRICK_ROWS; r++) {
          for (let c = 0; c < BRICK_COLS; c++) {
            if (!bricks[r][c].alive) continue;
            const bx = brickOffsetLeft + c * (brickW + BRICK_PAD);
            const by = brickOffsetTop + r * (brickH + BRICK_PAD);
            ctx.fillStyle = brickColors[r % brickColors.length];
            ctx.fillRect(bx, by, brickW, brickH);
            // Border
            ctx.strokeStyle = colors.border;
            ctx.lineWidth = 2;
            ctx.strokeRect(bx, by, brickW, brickH);
          }
        }

        // Paddle
        ctx.fillStyle = colors.paddle;
        ctx.fillRect(paddleX, paddleY, paddleW, paddleH);
        ctx.strokeStyle = colors.border;
        ctx.lineWidth = 2;
        ctx.strokeRect(paddleX, paddleY, paddleW, paddleH);

        // Ball
        ctx.beginPath();
        ctx.arc(ballX, ballY, ballR, 0, Math.PI * 2);
        ctx.fillStyle = colors.ball;
        ctx.fill();
        ctx.strokeStyle = colors.border;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      function gameLoop() {
        update();
        draw();
        animFrame = requestAnimationFrame(gameLoop);
      }

      function startGame() {
        if (gameRunning) return;
        gameRunning = true;
        gamePaused = false;
        resetGame();
        hideOverlay();
        if (!animFrame) gameLoop();
      }

      function gameOver() {
        gameRunning = false;
        if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
        showOverlay('Game Over', '', null, 'Score: ' + score, true);
      }

      function gameWin() {
        gameRunning = false;
        if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
        showOverlay('You found it!', '', null, 'Score: ' + score, true);
      }

      // ─── Interaction handler (FIX: called from overlay clicks) ───
      function handleInteraction(e) {
        if (e) e.preventDefault();
        if (!gameRunning) {
          startGame();
        } else if (!ballLaunched) {
          ballLaunched = true;
        }
      }

      // ─── Event listeners ───

      // FIX: Listen on the overlay element for clicks/taps
      overlay.addEventListener('click', handleInteraction);
      overlay.addEventListener('touchstart', handleInteraction, { passive: false });

      // Also listen on canvas for when overlay is hidden
      canvas.addEventListener('click', handleInteraction);
      canvas.addEventListener('touchstart', function (e) {
        e.preventDefault();
        if (e.touches.length > 0) {
          const rect = canvas.getBoundingClientRect();
          touchX = e.touches[0].clientX - rect.left;
        }
        handleInteraction(e);
      }, { passive: false });

      // Touch move
      canvas.addEventListener('touchmove', function (e) {
        e.preventDefault();
        if (e.touches.length > 0) {
          const rect = canvas.getBoundingClientRect();
          touchX = e.touches[0].clientX - rect.left;
        }
      }, { passive: false });

      canvas.addEventListener('touchend', function () {
        touchX = null;
      });

      // Mouse move
      wrapper.addEventListener('mousemove', function (e) {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
      });
      wrapper.addEventListener('mouseleave', function () {
        mouseX = null;
      });

      // Keyboard
      document.addEventListener('keydown', function (e) {
        keys[e.key] = true;

        // Space to launch
        if (e.key === ' ' || e.code === 'Space') {
          e.preventDefault();
          if (!gameRunning) {
            startGame();
          } else if (!ballLaunched) {
            ballLaunched = true;
          }
        }

        // FIX: Only navigate with Ctrl/Cmd + H (not bare H)
        if (e.key === 'h' && (e.ctrlKey || e.metaKey)) {
          // Allow default browser behavior (history back)
          return;
        }

        // FIX: Escape does NOT navigate away — removed entirely
      });
      document.addEventListener('keyup', function (e) {
        keys[e.key] = false;
      });

      // Retry button
      btnRetry.addEventListener('click', function (e) {
        e.stopPropagation();
        startGame();
      });

      // Theme toggle
      themeToggle.addEventListener('click', function () {
        const htmlEl = document.documentElement;
        const current = htmlEl.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        htmlEl.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        // Reload colors for game
        loadColors();
      });

      // Apply saved theme
      (function () {
        const stored = localStorage.getItem('theme');
        if (stored) {
          document.documentElement.setAttribute('data-theme', stored);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();

      // Resize handler
      let resizeTimer;
      window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
          resize();
          if (!gameRunning) {
            paddleX = (W - paddleW) / 2;
            initBall();
            draw();
          }
        }, 100);
      });

      // ─── Init ───
      resize();
      loadColors();
      initBricks();
      paddleX = (W - paddleW) / 2;
      initBall();
      updateUI();
      showOverlay('404', 'Click to play', null, null, false);
      draw();

    })();
  </script>
</body>
</html>
