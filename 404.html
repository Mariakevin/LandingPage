<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Page Not Found | Arun Kumar</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <meta name="theme-color" content="#FFFFFF">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* 404 Page Specific Styles */
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: var(--surface-primary);
      color: var(--text-primary);
      position: relative;
      overflow: hidden;
    }

    .error-page::before {
      content: '404';
      position: absolute;
      font-size: 30vw;
      font-weight: 700;
      opacity: 0.04;
      color: var(--text-primary);
      pointer-events: none;
      z-index: 0;
    }

    .error-content {
      position: relative;
      z-index: 1;
      max-width: 600px;
    }

    .error-code {
      font-family: var(--font-primary);
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700;
      line-height: 1;
      color: var(--accent-primary);
      margin-bottom: 1rem;
      text-shadow: 
        3px 3px 0 var(--text-primary),
        -3px -3px 0 var(--accent-secondary);
      animation: glitch-404 3s infinite;
    }

    @keyframes glitch-404 {
      0%, 100% { text-shadow: 3px 3px 0 var(--text-primary), -3px -3px 0 var(--accent-secondary); }
      10% { text-shadow: -3px -3px 0 var(--text-primary), 3px 3px 0 var(--accent-secondary); }
      20% { text-shadow: 3px 3px 0 var(--text-primary), -3px -3px 0 var(--accent-secondary); }
      30% { text-shadow: -3px -3px 0 var(--text-primary), 3px 3px 0 var(--accent-secondary); }
      40% { text-shadow: 3px 3px 0 var(--text-primary), -3px -3px 0 var(--accent-secondary); }
      50% { text-shadow: -3px -3px 0 var(--text-primary), 3px 3px 0 var(--accent-secondary); }
      60% { text-shadow: 3px 3px 0 var(--text-primary), -3px -3px 0 var(--accent-secondary); }
      70% { text-shadow: -3px -3px 0 var(--text-primary), 3px 3px 0 var(--accent-secondary); }
      80% { text-shadow: 3px 3px 0 var(--text-primary), -3px -3px 0 var(--accent-secondary); }
      90% { text-shadow: -3px -3px 0 var(--text-primary), 3px 3px 0 var(--accent-secondary); }
    }

    .error-message {
      font-family: var(--font-mono);
      font-size: 1.25rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .error-description {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.7;
      margin-bottom: 2rem;
      color: var(--text-secondary);
    }

    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-home-btn {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      background: var(--surface-dark);
      color: var(--text-inverse);
      border: var(--border-default);
      padding: 1rem 2rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: transform 0.2s var(--ease-smooth), box-shadow 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .error-home-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }

    .error-home-btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .error-back-btn {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      background: var(--surface-secondary);
      color: var(--text-primary);
      border: var(--border-default);
      padding: 1rem 2rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: transform 0.2s var(--ease-smooth), box-shadow 0.2s, background 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .error-back-btn:hover {
      background: var(--accent-secondary);
      color: var(--text-primary);
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }

    .error-back-btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    /* Theme toggle for 404 page */
    .error-theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--surface-dark);
      color: var(--text-inverse);
      border: var(--border-default);
      padding: var(--space-2);
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform var(--duration-fast) var(--ease-smooth);
      z-index: 100;
    }

    .error-theme-toggle:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }

    .error-theme-toggle:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .error-theme-toggle .icon-sun,
    .error-theme-toggle .icon-moon {
      width: 20px;
      height: 20px;
    }

    .error-theme-toggle .icon-sun { display: none; }
    .error-theme-toggle .icon-moon { display: block; }
    [data-theme="dark"] .error-theme-toggle .icon-sun { display: block; }
    [data-theme="dark"] .error-theme-toggle .icon-moon { display: none; }

    /* Decorative elements */
    .error-decoration {
      position: absolute;
      border: 3px solid var(--text-primary);
      opacity: 0.1;
      pointer-events: none;
    }

    .error-decoration:nth-child(1) {
      width: 200px;
      height: 200px;
      top: 10%;
      left: 10%;
      animation: float 6s ease-in-out infinite;
    }

    .error-decoration:nth-child(2) {
      width: 100px;
      height: 100px;
      bottom: 15%;
      right: 15%;
      animation: float 4s ease-in-out infinite reverse;
      border-radius: 50%;
    }

    .error-decoration:nth-child(3) {
      width: 60px;
      height: 60px;
      top: 20%;
      right: 20%;
      animation: spin 20s linear infinite;
      border-style: dashed;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .error-code { animation: none; }
      .error-decoration { animation: none; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#error-content">Skip to content</a>

  <!-- Decorative Elements -->
  <div class="error-decoration" aria-hidden="true"></div>
  <div class="error-decoration" aria-hidden="true"></div>
  <div class="error-decoration" aria-hidden="true"></div>

  <!-- Theme Toggle -->
  <button class="error-theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <main class="error-page" id="error-content">
    <div class="error-content">
      <div class="error-code" aria-hidden="true">404</div>
      <h1 class="error-message">Page not found</h1>
      <p class="error-description">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <div class="error-actions">
        <a href="index.html" class="error-home-btn">Go home →</a>
        <button onclick="history.back()" class="error-back-btn">← Go back</button>
      </div>
    </div>
  </main>

  <script>
    // Theme toggle for 404 page
    const themeToggle = document.getElementById('theme-toggle');
    const htmlEl = document.documentElement;

    function getPreferredTheme() {
      const stored = localStorage.getItem('theme');
      if (stored) return stored;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function setTheme(theme) {
      htmlEl.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }

    setTheme(getPreferredTheme());

    themeToggle.addEventListener('click', () => {
      const current = htmlEl.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('theme')) {
        setTheme(e.matches ? 'dark' : 'light');
      }
    });

    // Keyboard shortcut to go home
    document.addEventListener('keydown', (e) => {
      if (e.key === 'h' && !e.ctrlKey && !e.metaKey && !e.altKey) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
